<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 004</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="resultado.js" method="post">
        <p>
            <label for="icor">Cor: </label>
            <input type="color" name="cor" id="icor" value="#ffffff">
        </p>
        <p>
            <label for="inivel">Nível de Satisfação: </label>
            <input type="range" name="sats" id="inivel" min="1" max="10" value="5">
        </p>
        <p>
            <label for="ifoto">Foto do Perfil: </label>
            <input type="file" name="file" id="ifoto">
            <!-- Somente usar type = file quando for metodo post-->
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>

</body>
</html>
